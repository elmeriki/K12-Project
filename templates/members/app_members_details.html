{% load static %}
<!DOCTYPE html>
<html lang="en">
  {% include '../ext/header.html' %}
  <body>
    <!-- loader -->
    {% comment %} <div id="loader">
      <img src="assets/img/loading-icon.png" alt="icon" class="loading-icon" />
    </div> {% endcomment %}
    <!-- * loader -->

    <!-- * App Header -->
    {% include 'members/app_header.html' %}
    <!-- * App Header -->

    <!-- App Capsule -->
    <div id="appCapsule">
      <div class="section mt-2 text-center">
        <h1>Members Information</h1>
        <h4>View Members Informations</h4>
      </div>

      <div class="section mb-5 p-2">
        <form action="/activate_member_account" id="registerForm" method="post" onsubmit="submutbutton.disabled = true; return true;" autocomplete="off">
          {% csrf_token %}
          <div class="card">
            <div class="card-body">
              <div class="form-group basic">
                <div class="input-wrapper">
                  <label class="label" for="email1">FIRST NAME</label>
                  <input type="text" class="form-control" name="fname" id="email1" readonly value="{{select_members_instance.first_name}}"/>
                  <i class="clear-input"><ion-icon name="close-circle"></ion-icon></i>
                </div>
              </div>
              <div class="form-group basic">
                <div class="input-wrapper">
                  <label class="label" for="email1">LAST NAME</label>
                  <input type="text" class="form-control" name="lname" id="email1" readonly value="{{select_members_instance.last_name}}" placeholder="Enter your last name" />
                  <i class="clear-input"><ion-icon name="close-circle"></ion-icon></i>
                </div>
              </div>
              <div class="form-group basic">
                <div class="input-wrapper">
                  <label class="label" for="email1">PHONE NUMBER</label>
                  <input type="number" class="form-control" name="username" id="email1" readonly value="{{select_members_instance.username}}" placeholder="Your e-mail" />
                  <i class="clear-input"><ion-icon name="close-circle"></ion-icon></i>
                </div>
              </div>
              <div class="form-group basic">
                <div class="input-wrapper">
                  <label class="label" for="email1">EMAIL</label>
                  <input type="email" class="form-control" name="username" id="email1" readonly value="{{select_members_instance.email}}" placeholder="Your e-mail" />
                  <i class="clear-input"><ion-icon name="close-circle"></ion-icon></i>
                </div>
              </div>

                            <div class="form-group basic">
                <div class="input-wrapper">
                  <label class="label" for="email1">DECINATION</label>
                  <input type="email" class="form-control" name="username" id="email1" readonly value="{{select_members_instance.membershipTitle}}" placeholder="Your e-mail" />
                  <i class="clear-input"><ion-icon name="close-circle"></ion-icon></i>
                </div>
              </div>

            </div>
          </div>
          <br><br><br>
      <a href="/members_dashboard" class="btn btn-primary btn-block btn-lg">
            Close
        </a>
        </div>
        </form>

      
      </div>

    </div>
    <!-- * App Capsule -->

    <!-- App Bottom Menu -->
    {% include 'members/app_buttom_menu.html' %}
    <!-- App Bottom Menu -->

    {% include '../ext/footer.html' %}
  </body>
</html>
