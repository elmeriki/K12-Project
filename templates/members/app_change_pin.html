
<!doctype html>
<html lang="en">

<!-- * App Header -->
{% include "../ext/header.html" %}
<!-- * App Header -->
<body>

    <!-- loader -->
        {% include "members/app_loader.html" %}
    <!-- * loader -->

        <!-- * App Header -->
    {% include "members/app_header.html" %}
    <!-- * App Header -->
    <!-- App Header -->


    <!-- App Capsule -->
    <div id="appCapsule">

        <div class="section mt-2 text-center">
        </div>
        <div class="section mb-5 p-2">
            <form action="#" method="post" autocomplete="off">
                <div class="card">
                    <div class="card-body">
                        <div class="form-group basic">
                            <div class="input-wrapper">
                                <label class="label" for="email1">Phone Number</label>
                                <input type="text" class="form-control" id="email1" value="{{request.user.username}}" readonly>
                                <i class="clear-input">
                                    <ion-icon name="close-circle"></ion-icon>
                                </i>
                            </div>
                        </div>

                        <div class="form-group basic">
                            <div class="input-wrapper">
                                <label class="label" for="password2">PIN</label>
                                <input type="password" class="form-control" name="password" id="password2" inputmode="numeric" pattern="[0-9]*" maxlength="5" autocomplete="off"
                                    placeholder="Enter New 5 Digit PIN">
                                <i class="clear-input">
                                    <ion-icon name="close-circle"></ion-icon>
                                </i>
                            </div>
                        </div>

                    </div>
                </div>
                <br>
                <div class="form-button transparent">
                    <button type="submit" class="btn btn-warning btn-block btn-lg">Save Changes</button>
                </div>

            </form>
        </div>

    </div>
    <!-- * App Capsule -->



    <!-- App Bottom Menu -->
    {% include "members/app_buttom_menu.html" %}
    <!-- App Bottom Menu -->


{% include "../ext/footer.html" %}


</body>

</html>
